<!DOCTYPE html>
<html lang="fr">
<head>
  <title>Page introuvable (404)</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="/favicon.ico" sizes="any">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center px-4 font-sans">

  <div class="text-center max-w-md w-full">

    <div class="mb-8">
      <span class="text-8xl font-bold text-gray-300 select-none">404</span>
    </div>

    <div class="w-10 h-1 bg-yellow-400 mx-auto mb-8 rounded-full"></div>

    <h1 class="text-2xl font-bold text-gray-900 mb-3">Page introuvable</h1>
    <p class="text-gray-500 text-sm leading-relaxed mb-10">
      La page que vous cherchez n'existe pas ou a été déplacée.
    </p>

    <a href="/"
       class="inline-flex items-center gap-2 px-6 py-3 bg-gray-900 text-white text-sm font-semibold rounded-lg hover:bg-gray-800 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
      </svg>
      Retour à l'accueil
    </a>
  </div>

  <footer class="absolute bottom-6 text-center text-xs text-gray-400">
    © Maxime Oudin
  </footer>

</body>
</html>
